spring:
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: my-app-group          # default group-id if not set on annotation
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      enable-auto-commit: false        # required — parallel consumer manages offsets
      auto-offset-reset: earliest
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

# Global defaults for all @KafkaParallelListener instances
# These are overridden by values set directly on the annotation
kafka:
  parallel:
    default-max-concurrency: 100
    default-max-retries: 10
    default-retry-delay-ms: 1000
    use-virtual-threads: false        # set true when PR#908 is merged + Java 21+
